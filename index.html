<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="javascript/script.js" defer></script>
    <title>Frontend Mentor | Product list with cart</title>
  </head>
  <body>
    <main>
      <p class="main-title">Desserts</p>
      <div class="card">
        <img
          src="assets/images/image-waffle-mobile.jpg"
          alt=""
          class="card-image"
        />
        <button class="card-add-button">
          <img src="assets/images/icon-add-to-cart.svg" alt="" />
          <p>Add to Cart</p>
        </button>
        <p class="card-title">Waffle</p>
        <p class="card-description">Waffle with Berries</p>
        <p class="card-price">$6.50</p>
      </div>
    </main>
  </body>
</html>
